services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data

  # Живому захвату нужен доступ к raw-сокетам и интерфейсам хоста.
  # Работает на Linux-хостах. На macOS запускай нативно:
  #   sudo python -m capture.sniffer --iface en0
  # Включить:  docker compose --profile capture up
  sniffer:
    build: .
    command: python -m capture.sniffer --iface eth0
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./model:/app/model
      - ./data:/app/data
    profiles:
      - capture
